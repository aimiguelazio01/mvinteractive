<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolls-Royce Phantom | The Pinnacle of Luxury</title>
    <meta name="description"
        content="Experience the unparalleled luxury and craftsmanship of the Rolls-Royce Phantom. Explore our interactive gallery and cinematic journey.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav id="navbar">
            <div class="logo">
                <img src="assets/vectors/rolls-royce_logo_white_text_side.svg" alt="Rolls-Royce Logo" id="rr-logo">
            </div>
            <ul>
                <li><a href="#hero">Home</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#video-section">Cinematic</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="hero">
            <div class="hero-content">
                <img src="assets/vectors/rolls-royce_logo_white_text_side.svg" alt="Rolls-Royce Logo"
                    class="hero-logo fade-in">
                <h1 class="fade-in">PHANTOM</h1>
                <p class="fade-in delay-1">THE PINNACLE OF LUXURY</p>
                <a href="#gallery" class="cta-button fade-in delay-2">Explore Gallery</a>
            </div>
            <div class="hero-overlay"></div>
            <div style="position:relative;padding-top:56.25%;width:100%;height:100%;position:absolute;top:0;left:0;">
                <iframe src="https://player.mediadelivery.net/embed/625906/5e01c0f1-f170-4c44-85e8-a6dcabadf5de?autoplay=true&loop=true&muted=true&preload=true&responsive=true" loading="lazy" style="border:0;position:absolute;top:0;height:100%;width:100%;" allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;" allowfullscreen="true"></iframe>
            </div>
        </section>

        <section id="video-section">
            <div class="container">
                <h2 class="section-title">The Experience</h2>
                <div class="video-container">
                    <div style="position:relative;padding-top:56.25%;">
                        <iframe src="https://player.mediadelivery.net/embed/625906/5e01c0f1-f170-4c44-85e8-a6dcabadf5de?autoplay=true&loop=true&muted=true&preload=true&responsive=true" loading="lazy" style="border:0;position:absolute;top:0;height:100%;width:100%;" allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;" allowfullscreen="true"></iframe>
                    </div>
                </div>
            </div>
        </section>

        <section id="gallery">
            <div class="gallery-bg-ambience" id="gallery-bg-ambience"></div>
            <div class="container focus-rail-container">
                <h2 class="section-title">Gallery</h2>
                
                <div class="gallery-filters">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="configurator">Configurator</button>
                    <button class="filter-btn" data-category="street">Street</button>
                    <button class="filter-btn" data-category="winter">Winter</button>
                </div>

                <div class="focus-rail-viewport" id="focus-rail-viewport">
                    <div class="focus-rail-track" id="focus-rail-track">
                        <!-- Images will be populated by JavaScript -->
                    </div>
                </div>

                <div class="focus-rail-controls">
                    <div class="focus-rail-info" id="focus-rail-info">
                        <span class="focus-rail-meta" id="rail-meta">ROLLS-ROYCE</span>
                        <h3 class="focus-rail-title" id="rail-title">PHANTOM</h3>
                        <p class="focus-rail-description" id="rail-description">Experience the pinnacle of luxury.</p>
                    </div>

                    <div class="focus-rail-nav">
                        <button class="nav-prev" id="nav-prev" aria-label="Previous">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <span class="focus-rail-counter" id="rail-counter">1 / 15</span>
                        <button class="nav-next" id="nav-next" aria-label="Next">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <img src="assets/vectors/rolls-royce_logo_white.svg" alt="Rolls-Royce Logo" class="footer-logo">
            <p>&copy; 2026 Rolls-Royce Motor Cars. All rights reserved.</p>
        </div>
    </footer>



    <script src="script.js"></script>
</body>

</html>
